<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MessMate Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body.reset-page {
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #1c2a40 0%, #3f6f9f 90%);
  overflow: hidden;
  position: relative;
  color: #222;
}
.floating-shape { position: absolute; border-radius: 50%; opacity: 0.2; animation: floatShape 8s infinite alternate ease-in-out; }
.floating-shape.large { width: 120px; height: 120px; top: 10%; left: 15%; background: linear-gradient(135deg, #a3d8f4, #c1e7ff); animation-delay: 0s; }
.floating-shape.medium { width: 70px; height: 70px; top: 60%; right: 20%; background: linear-gradient(135deg, #b7e0f9, #d0f0ff); animation-delay: 3s; }
.floating-shape.small { width: 50px; height: 50px; bottom: 35%; left: 25%; background: linear-gradient(135deg, #d0f0ff, #e6f7ff); animation-delay: 5s; }
.floating-shape.tiny { width: 40px; height: 40px; bottom: 15%; right: 10%; background: linear-gradient(135deg, #ccefff, #f0fcff); animation-delay: 7s; }
@keyframes floatShape { 0% { transform: translateY(0px) translateX(0) scale(1); } 50% { transform: translateY(-20px) translateX(15px) scale(1.05); } 100% { transform: translateY(0px) translateX(0) scale(1); } }

.login-container { position: absolute; bottom: 0; width: 100%; height: 70%; background: rgba(245, 243, 238, 0.85); border-top-left-radius: 35px; border-top-right-radius: 35px; display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 40px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 15; opacity: 1; }
.login-card { max-width: 400px; width: 100%; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px 30px 40px; color: #222; box-shadow: 0 15px 35px rgba(0,0,0,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); }
.form-control { background: #f5f3ee; border: 1px solid #3a6b8f; color: #1e2a3b; }
.form-control::placeholder { color: #3a6b8f; }
.btn-login { background-color: #1e2a3b; border-color: #1e2a3b; color: #fff; font-weight: 600; transition: 0.3s ease; padding: 12px 0; border-radius: 12px; font-size: 1.05rem; }
.btn-login:hover, .btn-login:focus { background: linear-gradient(135deg, #c1e7ff, #a3d8f4); color: #1e2a3b; border-color: transparent; box-shadow: 0 0 25px rgba(193,231,255,0.5); }
.footer-symbol { font-size: 0.85rem; color: #888; text-align: center; margin-top: 15px; }

@media(max-width: 480px) { .floating-shape.large { width: 100px; height: 100px; top: 10%; left: 10%; } .floating-shape.medium { width: 50px; height: 50px; top: 50%; right: 20%; } }
</style>
</head>
<body class="reset-page">

<div class="floating-shape large"></div>
<div class="floating-shape medium"></div>
<div class="floating-shape small"></div>
<div class="floating-shape tiny"></div>

<div class="login-container">
  <div class="login-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message|safe }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h4 class="mb-4 text-center">Set New Password</h4>
    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="new_password" class="form-label">New Password</label>
        <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" required />
        <div class="form-text">Password must be at least 6 characters long.</div>
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm New Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required />
      </div>
      <button type="submit" class="btn btn-login w-100">Reset Password</button>
    </form>

    <div class="text-center mt-3">
      <p class="small"><a href="{{ url_for('login') }}">Back to Login</a></p>
    </div>
    <div class="footer-symbol"><small>{{ footer_symbol }}</small></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
